apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: supply-chain-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: sc-agent-sa
      containers:
        - name: backend
          # Replace ACCOUNT_ID and REGION
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/sc-agent-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: AWS_REGION
              value: "us-east-1"
            - name: BEDROCK_MODEL_ID
              value: "anthropic.claude-3-sonnet-20240229-v1:0"
            - name: USE_DYNAMODB
              value: "true"
            - name: DYNAMODB_TABLE
              value: "supply-chain-incidents"
          resources:
            requests: { cpu: 256m, memory: 512Mi }
            limits: { cpu: 512m, memory: 1Gi }
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
---
# Internet-facing NLB — gets a public IP automatically.
# Requires: AWS Load Balancer Controller installed on the cluster
# and public subnets tagged with kubernetes.io/role/elb=1
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: supply-chain-agent
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP

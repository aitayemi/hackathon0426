apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: supply-chain-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Replace ACCOUNT_ID and REGION
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/sc-agent-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests: { cpu: 128m, memory: 128Mi }
            limits: { cpu: 256m, memory: 256Mi }
---
# Internet-facing NLB — gets a public IP automatically.
# Requires: AWS Load Balancer Controller installed on the cluster
# and public subnets tagged with kubernetes.io/role/elb=1
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: supply-chain-agent
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP

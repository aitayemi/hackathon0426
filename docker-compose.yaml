version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION=us-east-1
      - BEDROCK_MODEL_ID=anthropic.claude-3-sonnet-20240229-v1:0
      - USE_DYNAMODB=false
      - ESCALATION_THRESHOLD=high
    volumes:
      - ~/.aws:/root/.aws:ro

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
